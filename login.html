<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacies Login - Pharma Care</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Login Specific CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Icon -->
            <div class="login-logo-icon">
                <i class='bx bx-plus-medical'></i>
            </div>

            <!-- Header Text -->
            <h2 class="login-title">Pharma Care</h2>
            <p class="login-subtitle">Pharmacist Portal Login</p>

            <!-- Login Form -->
            <form action="index.html" class="login-form">
                <div class="input-group">
                    <label>Pharmacy Email</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope'></i>
                        <input type="email" placeholder="pharmacist@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In to Dashboard</button>
            </form>

            <div class="login-footer">
                Protected by DevX security
            </div>
        </div>
    </div>
</body>

</html>
